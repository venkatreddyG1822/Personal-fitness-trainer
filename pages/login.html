<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PulseForge</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script defer src="../assets/js/main.js"></script>
</head>

<body>

<section class="auth-page">
  <div class="auth-tools" aria-label="Display controls">
    <button class="utility-button" type="button" data-rtl-toggle aria-label="Toggle RTL direction">
      <i class="fa-solid fa-globe" aria-hidden="true"></i>
    </button>
    <button class="utility-button" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <i class="fa-solid fa-sun" aria-hidden="true"></i>
    </button>
  </div>

  <div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-visual">
      <div class="auth-visual__content">
        <h1>Build Strength. Stay Consistent.</h1>
        <p>
          Structured workouts, smart nutrition, and accountability systems designed for real results.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-form-wrapper">

      <form class="auth-form" id="loginForm" novalidate>
        <a class="brand auth-brand" href="HomePage-1.html" aria-label="PulseForge Fitness home">
          <span class="brand__mark">
            <i class="fa-solid fa-dumbbell" aria-hidden="true"></i>
          </span>
          <span class="brand__copy">
            <strong>PulseForge</strong>
            <small>Performance Coaching</small>
          </span>
        </a>

        <div class="auth-form__header">
          <h2>Welcome Back</h2>
          <p>Sign in to continue your fitness journey.</p>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-field">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" required placeholder="Enter your email">
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" required placeholder="Enter your password">
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- OPTIONS -->
        <div class="form-options">
          <label class="checkbox">
            <input type="checkbox">
            <span>Remember me</span>
          </label>

          <a href="#">Forgot password?</a>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="button button--primary">
          Login
        </button>

        <!-- DIVIDER -->
        <div class="auth-divider">
          <span>or continue with</span>
        </div>

        <!-- SOCIAL -->
        <div class="social-login">
          <button type="button" class="button button--outline">
            <i class="fa-brands fa-google"></i> Google
          </button>
          <button type="button" class="button button--outline">
            <i class="fa-brands fa-apple"></i> Apple
          </button>
        </div>

        <!-- FOOTER -->
        <p class="auth-footer">
          Don’t have an account?
          <a href="register.html">Register</a>
        </p>

      </form>

    </div>

  </div>

</section>


</body>
</html>
