<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - PulseForge</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/dark-mode.css">
<script defer src="../assets/js/main.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<section class="auth-page">
  <div class="auth-tools" aria-label="Display controls">
    <button class="utility-button" type="button" data-rtl-toggle aria-label="Toggle RTL direction">
      <i class="fa-solid fa-globe" aria-hidden="true"></i>
    </button>
    <button class="utility-button" type="button" data-theme-toggle aria-label="Toggle dark mode">
      <i class="fa-solid fa-sun" aria-hidden="true"></i>
    </button>
  </div>

  <div class="auth-container">

    <!-- LEFT SIDE -->
    <div class="auth-visual">
      <div class="auth-visual__content">
        <h1>Start Your Transformation</h1>
        <p>
          Join PulseForge and unlock structured workouts, smart nutrition, and real results.
        </p>
      </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-form-wrapper">

      <form class="auth-form" id="registerForm" novalidate>
        <a class="brand auth-brand" href="HomePage-1.html" aria-label="PulseForge Fitness home">
          <span class="brand__mark">
            <i class="fa-solid fa-dumbbell" aria-hidden="true"></i>
          </span>
          <span class="brand__copy">
            <strong>PulseForge</strong>
            <small>Performance Coaching</small>
          </span>
        </a>

        <div class="auth-form__header">
          <h2>Create Your Account</h2>
          <p>Start your fitness transformation today.</p>
        </div>

        <!-- NAME -->
        <div class="form-group">
          <label>Full Name</label>
          <div class="input-field">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="name" required placeholder="Enter your name">
          </div>
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-field">
            <i class="fa-regular fa-envelope"></i>
            <input type="email" id="email" required placeholder="Enter your email">
          </div>
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>Password</label>
          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" required placeholder="Create password">
            <button type="button" class="password-toggle" id="togglePassword">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <small id="passwordStrength" class="form-hint"></small>
        </div>

        <!-- CONFIRM PASSWORD -->
        <div class="form-group">
          <label>Confirm Password</label>
          <div class="input-field">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="confirmPassword" required placeholder="Confirm password">
          </div>
        </div>

        <!-- GOAL -->
        <div class="form-group">
          <label>Fitness Goal</label>
          <div class="input-field">
            <i class="fa-solid fa-bullseye"></i>
            <select id="goal">
              <option>Fat Loss</option>
              <option>Muscle Gain</option>
              <option>Strength</option>
              <option>General Fitness</option>
            </select>
          </div>
        </div>

        <!-- TERMS -->
        <div class="form-options">
          <label class="checkbox">
            <input type="checkbox" id="terms">
            <span>I agree to Terms & Conditions</span>
          </label>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="button button--primary">
          Create Account
        </button>

        <!-- DIVIDER -->
        <div class="auth-divider">
          <span>or sign up with</span>
        </div>

        <!-- SOCIAL -->
        <div class="social-login">
          <button type="button" class="button button--outline">
            <i class="fa-brands fa-google"></i> Google
          </button>
          <button type="button" class="button button--outline">
            <i class="fa-brands fa-apple"></i> Apple
          </button>
        </div>

        <!-- FOOTER -->
        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Login</a>
        </p>

      </form>

    </div>

  </div>

</section>


<script>

// PASSWORD TOGGLE

</script>

</body>
</html>
