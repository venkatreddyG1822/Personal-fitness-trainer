<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - PulseForge</title>
    <link rel="icon" type="image/svg+xml" href="../assets/images/favicon.svg" />
<link rel="stylesheet" href="../assets/css/style.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<script href="../assets/js/main.js"></script>
</head>

<body>
    <section class="coming-soon-page">

  <div class="container">

    <div class="coming-soon-wrapper">

      <!-- VISUAL -->
      <div class="coming-soon__visual">
        <div class="coming-soon-glow"></div>
        <h1>Coming Soon</h1>
      </div>

      <!-- CONTENT -->
      <div class="coming-soon__content">

        <span class="section-kicker">New Experience Launching</span>

        <h2>We’re Building Something Powerful</h2>

        <p>
          A new level of training, nutrition, and performance tracking is on the way. 
          Stay tuned for a premium fitness experience designed for real results.
        </p>

        <!-- COUNTDOWN -->
        <div class="coming-soon__countdown" id="countdown">
          <div><span id="days">00</span><small>Days</small></div>
          <div><span id="hours">00</span><small>Hours</small></div>
          <div><span id="minutes">00</span><small>Minutes</small></div>
          <div><span id="seconds">00</span><small>Seconds</small></div>
        </div>

        <!-- SUBSCRIBE -->
        <form class="coming-soon__form">
          <input type="email" placeholder="Enter your email">
          <button type="submit" class="button button--primary">
            Notify Me
          </button>
        </form>

        <!-- SOCIAL -->
        <div class="coming-soon__social">
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-youtube"></i></a>
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
        </div>

      </div>

    </div>

  </div>

</section>
</body>
</html>
